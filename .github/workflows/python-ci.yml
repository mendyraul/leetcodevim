name: python-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install build
      - name: Run tests
        run: pytest -q
      - name: Static sanity
        run: python -m compileall src tests
      - name: Build wheel and sdist
        run: python -m build
      - name: Verify installed CLI smoke flow
        run: |
          python -m venv /tmp/leetcodevim-smoke-venv
          /tmp/leetcodevim-smoke-venv/bin/pip install dist/*.whl
          /tmp/leetcodevim-smoke-venv/bin/leetcodevim --help >/tmp/leetcodevim-help.txt
          grep -q 'status' /tmp/leetcodevim-help.txt
